<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A0080"/>
      <stop offset="50%" style="stop-color:#8B1FA8"/>
      <stop offset="100%" style="stop-color:#C850C0"/>
    </linearGradient>
    <!-- Horn gradient -->
    <linearGradient id="hornGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE566"/>
      <stop offset="100%" style="stop-color:#FF9900"/>
    </linearGradient>
    <!-- Face shadow gradient -->
    <radialGradient id="faceGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F0E8F5"/>
    </radialGradient>
    <!-- Muzzle gradient -->
    <radialGradient id="muzzleGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#FFD6E8"/>
      <stop offset="100%" style="stop-color:#FFB3D1"/>
    </radialGradient>
    <!-- Glow filter for headphones -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Star sparkle -->
    <filter id="sparkle">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="1024" height="1024" rx="210" ry="210" fill="url(#bgGrad)"/>

  <!-- Subtle background sparkles -->
  <circle cx="120" cy="120" r="6" fill="white" opacity="0.4"/>
  <circle cx="900" cy="150" r="4" fill="white" opacity="0.3"/>
  <circle cx="80" cy="880" r="5" fill="white" opacity="0.3"/>
  <circle cx="940" cy="860" r="7" fill="white" opacity="0.4"/>
  <circle cx="180" cy="500" r="3" fill="white" opacity="0.25"/>
  <circle cx="860" cy="420" r="3" fill="white" opacity="0.25"/>

  <!-- Small star shapes -->
  <polygon points="150,300 155,315 170,315 158,324 163,339 150,330 137,339 142,324 130,315 145,315" fill="white" opacity="0.3"/>
  <polygon points="870,680 874,691 885,691 876,697 880,708 870,702 860,708 864,697 855,691 866,691" fill="white" opacity="0.3"/>

  <!-- ── Rainbow mane (behind head, left side) ── -->
  <!-- Layer 1: red -->
  <path d="M 370,415 C 280,460 240,560 260,680 C 275,760 320,810 360,840"
        stroke="#FF4466" stroke-width="36" fill="none" stroke-linecap="round" opacity="0.95"/>
  <!-- Layer 2: orange -->
  <path d="M 375,420 C 278,468 238,572 260,692 C 276,772 322,818 362,845"
        stroke="#FF8C00" stroke-width="28" fill="none" stroke-linecap="round" opacity="0.95"/>
  <!-- Layer 3: yellow -->
  <path d="M 380,425 C 276,476 236,584 260,700 C 277,782 324,825 365,849"
        stroke="#FFD700" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.95"/>
  <!-- Layer 4: green -->
  <path d="M 383,430 C 274,482 234,592 260,706 C 278,789 326,830 368,852"
        stroke="#44DD66" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.95"/>
  <!-- Layer 5: blue -->
  <path d="M 386,434 C 272,488 232,598 260,712 C 279,794 328,835 370,855"
        stroke="#4499FF" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.95"/>
  <!-- Layer 6: purple -->
  <path d="M 388,437 C 271,492 231,602 260,716 C 280,798 330,839 372,858"
        stroke="#CC44FF" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.95"/>

  <!-- ── Left ear (behind headphone cup, in front of mane) ── -->
  <polygon points="362,398 320,270 450,355" fill="#F5F0FF"/>
  <polygon points="368,390 338,298 432,358" fill="#FFB3D1"/>

  <!-- ── Right ear ── -->
  <polygon points="662,398 704,270 574,355" fill="#F5F0FF"/>
  <polygon points="656,390 686,298 592,358" fill="#FFB3D1"/>

  <!-- ── Unicorn head ── -->
  <ellipse cx="512" cy="585" rx="230" ry="245" fill="url(#faceGrad)"/>

  <!-- ── Muzzle / snout ── -->
  <ellipse cx="512" cy="740" rx="120" ry="78" fill="url(#muzzleGrad)"/>

  <!-- Subtle cheek blush -->
  <ellipse cx="390" cy="650" rx="55" ry="38" fill="#FFB3CC" opacity="0.35"/>
  <ellipse cx="634" cy="650" rx="55" ry="38" fill="#FFB3CC" opacity="0.35"/>

  <!-- ── Eyes ── -->
  <!-- Left eye -->
  <ellipse cx="438" cy="580" rx="38" ry="44" fill="#1A0030"/>
  <ellipse cx="438" cy="578" rx="30" ry="36" fill="#2D0060"/>
  <!-- Iris color -->
  <ellipse cx="438" cy="578" rx="22" ry="28" fill="#6622CC"/>
  <!-- Pupil -->
  <ellipse cx="438" cy="580" rx="14" ry="20" fill="#0A0015"/>
  <!-- Shine highlights -->
  <ellipse cx="447" cy="565" rx="9" ry="7" fill="white" opacity="0.9"/>
  <circle cx="430" cy="575" r="4" fill="white" opacity="0.6"/>

  <!-- Right eye -->
  <ellipse cx="586" cy="580" rx="38" ry="44" fill="#1A0030"/>
  <ellipse cx="586" cy="578" rx="30" ry="36" fill="#2D0060"/>
  <ellipse cx="586" cy="578" rx="22" ry="28" fill="#6622CC"/>
  <ellipse cx="586" cy="580" rx="14" ry="20" fill="#0A0015"/>
  <ellipse cx="595" cy="565" rx="9" ry="7" fill="white" opacity="0.9"/>
  <circle cx="578" cy="575" r="4" fill="white" opacity="0.6"/>

  <!-- Eyelashes left -->
  <line x1="408" y1="546" x2="398" y2="530" stroke="#1A0030" stroke-width="4" stroke-linecap="round"/>
  <line x1="423" y1="538" x2="416" y2="520" stroke="#1A0030" stroke-width="4" stroke-linecap="round"/>
  <line x1="438" y1="534" x2="434" y2="516" stroke="#1A0030" stroke-width="4" stroke-linecap="round"/>
  <line x1="453" y1="538" x2="452" y2="520" stroke="#1A0030" stroke-width="4" stroke-linecap="round"/>
  <line x1="466" y1="546" x2="468" y2="528" stroke="#1A0030" stroke-width="4" stroke-linecap="round"/>

  <!-- Eyelashes right -->
  <line x1="556" y1="546" x2="546" y2="528" stroke="#1A0030" stroke-width="4" stroke-linecap="round"/>
  <line x1="571" y1="538" x2="564" y2="520" stroke="#1A0030" stroke-width="4" stroke-linecap="round"/>
  <line x1="586" y1="534" x2="582" y2="516" stroke="#1A0030" stroke-width="4" stroke-linecap="round"/>
  <line x1="601" y1="538" x2="600" y2="520" stroke="#1A0030" stroke-width="4" stroke-linecap="round"/>
  <line x1="614" y1="546" x2="618" y2="530" stroke="#1A0030" stroke-width="4" stroke-linecap="round"/>

  <!-- ── Nostrils ── -->
  <ellipse cx="484" cy="748" rx="16" ry="11" fill="#CC8899" opacity="0.7"/>
  <ellipse cx="540" cy="748" rx="16" ry="11" fill="#CC8899" opacity="0.7"/>

  <!-- Subtle smile line -->
  <path d="M 478,768 Q 512,782 546,768" stroke="#CC8899" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- ── Horn ── -->
  <polygon points="512,168 480,395 544,395" fill="url(#hornGrad)"/>
  <!-- Horn spiral lines -->
  <line x1="502" y1="210" x2="520" y2="232" stroke="#CC7700" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="494" y1="258" x2="524" y2="284" stroke="#CC7700" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="487" y1="308" x2="528" y2="336" stroke="#CC7700" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="482" y1="355" x2="530" y2="380" stroke="#CC7700" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <!-- Horn highlight -->
  <line x1="498" y1="185" x2="490" y2="370" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.4"/>

  <!-- ── Headphone band ── -->
  <path d="M 272,535 C 272,300 752,300 752,535"
        stroke="#1A1A2E" stroke-width="36" fill="none" stroke-linecap="round"/>
  <!-- Band highlight -->
  <path d="M 278,530 C 278,310 746,310 746,530"
        stroke="#3D3D5C" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- ── Left headphone cup ── -->
  <!-- Outer shell -->
  <ellipse cx="272" cy="558" rx="72" ry="84" fill="#1A1A2E"/>
  <!-- Mid layer -->
  <ellipse cx="272" cy="558" rx="60" ry="70" fill="#2A2A4E"/>
  <!-- Inner pad -->
  <ellipse cx="272" cy="558" rx="44" ry="52" fill="#16213E"/>
  <!-- Speaker mesh dots -->
  <circle cx="258" cy="544" r="5" fill="#3D3D6E" opacity="0.8"/>
  <circle cx="272" cy="544" r="5" fill="#3D3D6E" opacity="0.8"/>
  <circle cx="286" cy="544" r="5" fill="#3D3D6E" opacity="0.8"/>
  <circle cx="258" cy="558" r="5" fill="#3D3D6E" opacity="0.8"/>
  <circle cx="272" cy="558" r="5" fill="#4A4A8E" opacity="0.9"/>
  <circle cx="286" cy="558" r="5" fill="#3D3D6E" opacity="0.8"/>
  <circle cx="258" cy="572" r="5" fill="#3D3D6E" opacity="0.8"/>
  <circle cx="272" cy="572" r="5" fill="#3D3D6E" opacity="0.8"/>
  <circle cx="286" cy="572" r="5" fill="#3D3D6E" opacity="0.8"/>
  <!-- Accent LED -->
  <ellipse cx="290" cy="524" rx="7" ry="5" fill="#CC44FF" opacity="0.9" filter="url(#glow)"/>

  <!-- ── Right headphone cup ── -->
  <!-- Outer shell -->
  <ellipse cx="752" cy="558" rx="72" ry="84" fill="#1A1A2E"/>
  <!-- Mid layer -->
  <ellipse cx="752" cy="558" rx="60" ry="70" fill="#2A2A4E"/>
  <!-- Inner pad -->
  <ellipse cx="752" cy="558" rx="44" ry="52" fill="#16213E"/>
  <!-- Speaker mesh dots -->
  <circle cx="738" cy="544" r="5" fill="#3D3D6E" opacity="0.8"/>
  <circle cx="752" cy="544" r="5" fill="#3D3D6E" opacity="0.8"/>
  <circle cx="766" cy="544" r="5" fill="#3D3D6E" opacity="0.8"/>
  <circle cx="738" cy="558" r="5" fill="#3D3D6E" opacity="0.8"/>
  <circle cx="752" cy="558" r="5" fill="#4A4A8E" opacity="0.9"/>
  <circle cx="766" cy="558" r="5" fill="#3D3D6E" opacity="0.8"/>
  <circle cx="738" cy="572" r="5" fill="#3D3D6E" opacity="0.8"/>
  <circle cx="752" cy="572" r="5" fill="#3D3D6E" opacity="0.8"/>
  <circle cx="766" cy="572" r="5" fill="#3D3D6E" opacity="0.8"/>
  <!-- Accent LED -->
  <ellipse cx="734" cy="524" rx="7" ry="5" fill="#CC44FF" opacity="0.9" filter="url(#glow)"/>

  <!-- ── Small music note decoration ── -->
  <text x="870" y="310" font-size="72" fill="white" opacity="0.25" font-family="serif">♪</text>
  <text x="100" y="760" font-size="52" fill="white" opacity="0.2" font-family="serif">♫</text>
</svg>
