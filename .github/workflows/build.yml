name: Build Apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ── Build macOS .app zip ────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Zip full project
        run: |
          mkdir AudiobookDownloader-macOS
          cp -r "Audiobook Downloader.app" AudiobookDownloader-macOS/
          cp main.py utils.py search.py pyproject.toml uv.lock AudiobookDownloader-macOS/
          cp run.command AudiobookDownloader-macOS/
          cp -r scrapers AudiobookDownloader-macOS/
          zip -r "AudiobookDownloader-macOS.zip" AudiobookDownloader-macOS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudiobookDownloader-macOS
          path: AudiobookDownloader-macOS.zip
          retention-days: 30

  # ── Build Windows .exe ──────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies + build tools
        run: |
          uv sync
          uv pip install pyinstaller pillow

      - name: Create Windows icon (.ico)
        run: |
          uv run python -c "
          from PIL import Image
          img = Image.open('Audiobook Downloader.app/Contents/Resources/AppIcon_source.png').convert('RGBA')
          img.save('icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          print('icon.ico created')
          "

      - name: Build executable
        run: |
          uv run pyinstaller `
            --onefile `
            --console `
            --name "AudiobookDownloader" `
            --icon icon.ico `
            --collect-all yt_dlp `
            --collect-all mutagen `
            --collect-all rich `
            --collect-all bs4 `
            --collect-all textual `
            --collect-all PIL `
            --hidden-import scrapers.tokybook `
            --hidden-import scrapers.audiozaic `
            --hidden-import scrapers.zaudiobooks `
            --hidden-import scrapers.generic `
            ui.py

      - name: Smoke test executable
        run: |
          # Start the app and pipe a blank line as input.
          # A crash on startup (bad imports, missing files) exits immediately with code 1.
          # Successfully reaching the interactive prompt means it hangs — we kill it after
          # a timeout and treat that as a pass.
          $proc = Start-Process -FilePath "dist\AudiobookDownloader.exe" `
            -PassThru -NoNewWindow `
            -RedirectStandardInput  "NUL" `
            -RedirectStandardOutput smoke_out.txt `
            -RedirectStandardError  smoke_err.txt
          $exited = $proc.WaitForExit(15000)   # 15-second timeout
          $output = Get-Content smoke_out.txt -ErrorAction SilentlyContinue
          $errors = Get-Content smoke_err.txt -ErrorAction SilentlyContinue
          Write-Host "--- stdout ---"; $output
          Write-Host "--- stderr ---"; $errors
          if ($exited -and $proc.ExitCode -ne 0) {
            Write-Error "App crashed on startup (exit code $($proc.ExitCode))"
            exit 1
          }
          if (-not $exited) {
            $proc.Kill()
            Write-Host "Smoke test passed — app reached interactive prompt."
          } else {
            Write-Host "Smoke test passed — app exited cleanly (exit code 0)."
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudiobookDownloader-Windows
          path: dist/AudiobookDownloader.exe
          retention-days: 30

  # ── Create GitHub Release (only on version tags) ────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: AudiobookDownloader-macOS

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: AudiobookDownloader-Windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body: |
            ## Download

            | Platform | File | Notes |
            |---|---|---|
            | **macOS** | `AudiobookDownloader-macOS.zip` below | Unzip, double-click the app. FFmpeg auto-installed on first run. |
            | **Windows** | `AudiobookDownloader.exe` below | Requires [FFmpeg](https://ffmpeg.org/) — run `winget install ffmpeg` |

            > **macOS note:** First time only — right-click → **Open** to bypass Gatekeeper.
            > **Windows note:** SmartScreen may warn "unrecognized app". Click **More info → Run anyway** to proceed.
          files: |
            AudiobookDownloader-macOS.zip
            AudiobookDownloader.exe
          generate_release_notes: true
